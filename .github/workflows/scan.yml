name: Altcoin Signal Scanner

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 실행
  workflow_dispatch:

# ── 동시 배포 충돌 방지 ─────────────────────────────────────────
# 이전 배포가 진행 중일 때 새 push가 오면 이전 것을 취소하고 새 것 진행
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write          # Pages 배포 권한 명시
  id-token: write       # OIDC 토큰 (Pages 배포 인증)

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install ccxt pandas requests

      - name: 스캐너 실행
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u docs/scanner.py

      - name: 시그널 저장
        run: |
          git config user.name "SignalBot"
          git config user.email "bot@signal"
          git add docs/signals.json docs/recommendations.json
          git diff --staged --quiet || git commit -m "시그널 업데이트 $(date -u +'%Y-%m-%d %H:%M')"
          git push
